name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow manual runs from the GitHub Actions UI (your GitHub profile)
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend dependencies (exclude tensorflow)
        run: |
          python -m pip install --upgrade pip
          # remove heavy/optional tensorflow line so CI runner can install remaining deps
          if [ -f Backend/requirements.txt ]; then sed -i '/tensorflow/d' Backend/requirements.txt || true; fi
          python -m pip install -r Backend/requirements.txt || true

      - name: Start backend
        run: |
          # Start app in background and capture logs
          nohup python Backend/app.py > backend.log 2>&1 &
          sleep 4

      - name: Check backend health
        run: |
          curl -fS http://localhost:5000/health

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd fyp-frontend1
          npm ci

      - name: Build frontend
        run: |
          cd fyp-frontend1
          npm run build

      - name: Verify build output
        run: |
          test -d fyp-frontend1/build
